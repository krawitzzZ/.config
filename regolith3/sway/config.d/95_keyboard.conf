input type:keyboard {
    # ms before key starts repeating (lower = snappier; sway default ~600)
    repeat_delay 250
    # repeats per second (higher = faster; default ~25)
    repeat_rate 40
    # Caps Lock becomes an extra Ctrl; Right Alt becomes a Compose key
    xkb_options ctrl:nocaps,compose:ralt
    xkb_layout "us,ru"
}
