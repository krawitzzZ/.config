# --- Disable Regolith's default ilia launcher bindings ---
unbindsym $mod+space           # ilia app launcher
unbindsym $mod+Shift+space     # ilia command launcher
unbindsym $mod+Ctrl+space      # ilia window switcher
unbindsym $mod+Mod1+space      # ilia file search (Mod1 = Alt)

# --- Start vicinae launcher ---
exec --no-startup-id env -u GDMSESSION XDG_CURRENT_DESKTOP=sway QT_QPA_PLATFORM=xcb /usr/local/bin/vicinae server
bindsym $mod+space exec /usr/local/bin/vicinae vicinae://toggle

# --- Lock screen ---
bindsym $mod+Ctrl+Alt+l exec swaylock -f -c 000000

# --- Sleep / suspend (remapped from Regolith default Win+Shift+S, now used for screenshot) ---
bindsym --locked $mod+Ctrl+Alt+s exec $wm.program.sleep

# --- Screenshot region to clipboard ---
bindsym $mod+Shift+s exec grim -g "$(slurp)" - | wl-copy

# --- Record region to GIF (toggle: press once to start, again to stop) ---
bindsym $mod+Shift+g exec ~/.config/regolith3/sway/scripts/record-gif.sh

# --- Switch keyboard layout with Ctrl+Alt+backslash ---
bindsym Ctrl+Alt+backslash input type:keyboard xkb_switch_layout next
