# Edge spawns its hover/URL-status overlay as an xdg_shell toplevel with an
# empty app_id (and empty title). Sway tiles it, which reflows the layout.
# Float it so it never disturbs the tiled windows, and don't let it grab focus.
for_window [app_id="^$" shell="xdg_shell"] floating enable, move scratchpad
no_focus  [app_id="^$" shell="xdg_shell"]
