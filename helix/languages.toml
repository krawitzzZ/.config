[language-server.tailwindcss-ls]
config = { userLanguages = { gotmpl = "html" } }

# Snippets language server
[language-server.scls]
command = "simple-completion-language-server"

[language-server.scls.config]
max_completion_items = 20
snippets_first = true
feature_words = true
feature_snippets = true
feature_unicode_input = true
feature_paths = true

[language-server.scls.environment]
RUST_LOG = "info,simple-completion-language-server=info"
LOG_FILE = "/tmp/completion.log"

[language-server.omnisharp]
command = "OmniSharp"
args = ["-lsp"]
timeout = 30

[[language]]
name = "toml"
formatter = { command = 'taplo', args = ["format", "-"] }
auto-format = true

[[language]]
name = "html"
formatter = { command = 'prettier', args = ["--parser", "html"] }
language-servers = ["vscode-html-language-server", "tailwindcss-ls"]
auto-format = false

[[language]]
name = "json"
formatter = { command = 'prettier' }
auto-format = false

[[language]]
name = "gotmpl"
language-servers = ["gopls", "vscode-html-language-server", "tailwindcss-ls"]

[[language]]
name = "css"
formatter = { command = 'prettier', args = ["--parser", "css"] }
language-servers = ["vscode-css-language-server", "tailwindcss-ls"]
auto-format = true

[[language]]
name = "javascript"
formatter = { command = 'prettier', args = ["--parser", "typescript"] }
auto-format = true
language-servers = [
    { name = "scls", only-features = [
        "completion",
    ] },
    "typescript-language-server",
    "vscode-eslint-language-server",
]

[[language]]
name = "typescript"
formatter = { command = 'prettier', args = ["--parser", "typescript"] }
auto-format = true
language-servers = [
    { name = "scls", only-features = [
        "completion",
    ] },
    "typescript-language-server",
    "vscode-eslint-language-server",
]

[[language]]
name = "tsx"
formatter = { command = 'prettier', args = ["--parser", "typescript"] }
auto-format = true
language-servers = [
    "typescript-language-server",
    { name = "scls" },
    "tailwindcss-ls",
    "vscode-eslint-language-server",
]


[[language]]
name = "haskell"
formatter = { command = 'stylish-haskell' }
auto-format = false

[[language]]
name = "go"
auto-format = true

[[language]]
name = "c-sharp"
scope = "source.cs"
injection-regex = "c-?sharp"
roots = ["sln", "csproj"]
file-types = ["cs"]
comment-token = "//"
indent = { tab-width = 4, unit = "  " }
language-servers = ["omnisharp"]

[language-server.pylsp.config.pylsp]
plugins.pylint.enabled = true
plugins.black.enabled = true
plugins.pycodestyle.maxLineLength = 100
plugins.mccabe.threshold = 20

[[language]]
name = "python"
auto-format = true
